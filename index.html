<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secret Prompt Generator — Learn Anything Smarter</title>
<meta name="description" content="Generate a custom AI prompt that acts like a personal tutor — designed exactly for how you learn."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: rgba(201,168,76,0.15);
    --bg: #090910;
    --bg2: #0f0f18;
    --bg3: #141420;
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(201,168,76,0.5);
    --text: #f0ebe0;
    --text-muted: #7a7870;
    --text-mid: #b0a898;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 580px; }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 64px 0 48px;
    animation: fadeUp 0.8s ease both;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    margin-bottom: 16px;
    display: block;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 7vw, 52px);
    font-weight: 400;
    line-height: 1.15;
    color: #f5f0e8;
    margin-bottom: 16px;
  }

  h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.7;
    font-weight: 300;
    max-width: 400px;
    margin: 0 auto;
  }

  /* ── Card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    width: 100%;
    box-shadow: 0 0 80px rgba(201,168,76,0.05), 0 40px 80px rgba(0,0,0,0.4);
    animation: fadeUp 0.8s 0.15s ease both;
  }

  /* ── Progress bar ── */
  .progress { display: flex; gap: 6px; margin-bottom: 32px; }
  .progress-bar {
    flex: 1; height: 2px; border-radius: 99px;
    background: var(--border);
    transition: background 0.4s ease;
  }
  .progress-bar.done {
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
  }

  /* ── Step titles ── */
  .step-head { margin-bottom: 6px; }
  .step-head h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: #f0e8d8;
  }
  .step-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
    font-weight: 300;
  }

  /* ── Grid chips ── */
  .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    text-align: center;
  }
  .chip:hover { border-color: rgba(201,168,76,0.3); color: var(--text-mid); }
  .chip.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    color: var(--gold-light);
  }
  .chip-icon { font-size: 20px; }

  /* ── List items ── */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    text-align: left;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s ease;
    line-height: 1.4;
  }
  .list-item:hover { border-color: rgba(201,168,76,0.3); color: var(--text-mid); }
  .list-item.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    color: var(--gold-light);
  }

  /* ── Input ── */
  .topic-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
  }
  .topic-input:focus { border-color: rgba(201,168,76,0.4); }
  .topic-input::placeholder { color: var(--text-muted); }
  .input-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; font-weight: 300; }

  /* ── Nav buttons ── */
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; }
  .btn-back {
    padding: 11px 20px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--border-active); color: var(--text-mid); }

  .btn-next {
    padding: 12px 28px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: var(--bg3);
    color: var(--text-muted);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: not-allowed;
    transition: all 0.3s ease;
    font-weight: 500;
  }
  .btn-next.ready {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: #0a0a0f;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(201,168,76,0.25);
  }
  .btn-next.ready:hover { box-shadow: 0 6px 32px rgba(201,168,76,0.4); transform: translateY(-1px); }

  /* ── Generated prompt ── */
  .prompt-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius-sm);
    padding: 24px 20px;
    margin-bottom: 20px;
    position: relative;
  }
  .prompt-label {
    position: absolute;
    top: -10px; left: 16px;
    background: var(--bg2);
    padding: 2px 12px;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 3px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 99px;
    text-transform: uppercase;
  }
  .prompt-text {
    font-size: 14px;
    line-height: 1.85;
    color: #d8d0c0;
    white-space: pre-wrap;
    font-weight: 300;
  }

  .btn-copy {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0a0a0f;
    font-weight: 500;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 10px;
  }
  .btn-copy:hover { box-shadow: 0 6px 28px rgba(201,168,76,0.35); transform: translateY(-1px); }
  .btn-copy.copied { background: linear-gradient(135deg, #3a7a4a, #5aaa6a); }

  .btn-new {
    width: 100%;
    padding: 11px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-new:hover { border-color: var(--border-active); color: var(--text-mid); }

  .prompt-footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 14px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ── Loading spinner ── */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px 0;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text {
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 28px;
    font-weight: 300;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  footer a { color: var(--gold); text-decoration: none; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Step transition */
  .step-wrap { animation: fadeUp 0.3s ease both; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .chips { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <span class="eyebrow">✦ The Secret Prompt ✦</span>
    <h1>Learn Anything.<br><em>Smarter.</em></h1>
    <p class="subtitle">Generate a custom AI prompt that acts like a personal tutor — designed exactly for how <em>you</em> learn.</p>
  </header>

  <div class="card" id="card">
    <!-- Progress -->
    <div class="progress" id="progress">
      <div class="progress-bar" id="p1"></div>
      <div class="progress-bar" id="p2"></div>
      <div class="progress-bar" id="p3"></div>
      <div class="progress-bar" id="p4"></div>
    </div>
    <!-- Step content injected here -->
    <div id="step-content"></div>
  </div>

  <footer>
    Works with Claude · ChatGPT · Gemini · Any AI &nbsp;·&nbsp;
    Built with ♥ for freshers everywhere
  </footer>
</div>

<script>
const FIELDS = [
  { emoji: "💉", label: "Medical Student",       value: "medical student" },
  { emoji: "⚙️", label: "B.Tech / Engineering",  value: "B.Tech engineering student" },
  { emoji: "💻", label: "CS / IT",               value: "computer science / IT student" },
  { emoji: "📊", label: "Data / Analytics",      value: "data engineering / analytics fresher" },
  { emoji: "⚖️", label: "Law Student",           value: "law student" },
  { emoji: "🎨", label: "Design / UX",           value: "design / UX student" },
  { emoji: "📈", label: "MBA / Business",         value: "MBA / business student" },
  { emoji: "🔬", label: "Science / Research",    value: "science / research student" },
  { emoji: "🧑‍🍳", label: "Culinary / Hospitality",value:"culinary / hospitality student" },
  { emoji: "🎓", label: "Other Fresher",          value: "fresher / beginner" },
];

const GOALS = [
  "Understand a tough concept from scratch",
  "Prepare for an exam or interview",
  "Build a project or portfolio",
  "Learn a new skill quickly",
  "Get a study plan / roadmap",
  "Solve a specific problem I'm stuck on",
];

const STYLES = [
  { label: "Simple & Friendly",  icon: "😊" },
  { label: "Deep & Detailed",    icon: "🧠" },
  { label: "Step-by-Step Guide", icon: "📋" },
  { label: "Analogy-Based",      icon: "🔗" },
  { label: "Story Mode",         icon: "📖" },
  { label: "Like a YouTube Video", icon: "▶️" },
];

let state = { step: 1, field: null, goal: null, style: null, topic: "", prompt: "" };

function canProceed() {
  if (state.step === 1) return !!state.field;
  if (state.step === 2) return !!state.goal;
  if (state.step === 3) return !!state.style;
  if (state.step === 4) return state.topic.trim().length > 2;
  return false;
}

function updateProgress() {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('p' + i);
    el.classList.toggle('done', i <= state.step);
  }
}

function render() {
  updateProgress();
  const c = document.getElementById('step-content');

  if (state.loading) {
    c.innerHTML = `
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p class="loading-text">Crafting your secret prompt…</p>
      </div>`;
    return;
  }

  if (state.prompt) {
    document.getElementById('progress').style.display = 'none';
    c.innerHTML = `
      <div class="step-wrap">
        <div class="prompt-box">
          <span class="prompt-label">Your Secret Prompt</span>
          <p class="prompt-text" id="prompt-text">${escHtml(state.prompt)}</p>
        </div>
        <button class="btn-copy" id="copy-btn" onclick="copyPrompt()">📋 Copy Prompt</button>
        <button class="btn-new" onclick="resetAll()">↩ Generate a new one</button>
        <p class="prompt-footer">Paste this into Claude, ChatGPT, or any AI chatbot.<br>Replace the last line with your actual topic.</p>
      </div>`;
    return;
  }

  document.getElementById('progress').style.display = 'flex';

  if (state.step === 1) {
    c.innerHTML = `
      <div class="step-wrap">
        <div class="step-head"><h2>Who are you?</h2></div>
        <p class="step-sub">Pick your background</p>
        <div class="chips">${FIELDS.map(f => `
          <button class="chip${state.field===f.value?' active':''}" onclick="select('field','${f.value}')">
            <span class="chip-icon">${f.emoji}</span>
            <span>${f.label}</span>
          </button>`).join('')}</div>
        ${navHTML()}
      </div>`;
  } else if (state.step === 2) {
    c.innerHTML = `
      <div class="step-wrap">
        <div class="step-head"><h2>What's your goal?</h2></div>
        <p class="step-sub">What do you want to achieve?</p>
        <div class="list">${GOALS.map(g => `
          <button class="list-item${state.goal===g?' active':''}" onclick="select('goal',this.dataset.v)" data-v="${escAttr(g)}">${escHtml(g)}</button>`).join('')}</div>
        ${navHTML()}
      </div>`;
  } else if (state.step === 3) {
    c.innerHTML = `
      <div class="step-wrap">
        <div class="step-head"><h2>How do you like to learn?</h2></div>
        <p class="step-sub">Choose your style</p>
        <div class="chips">${STYLES.map(s => `
          <button class="chip${state.style===s.label?' active':''}" onclick="select('style','${escAttr(s.label)}')">
            <span class="chip-icon">${s.icon}</span>
            <span>${s.label}</span>
          </button>`).join('')}</div>
        ${navHTML()}
      </div>`;
  } else if (state.step === 4) {
    c.innerHTML = `
      <div class="step-wrap">
        <div class="step-head"><h2>What do you want to learn?</h2></div>
        <p class="step-sub">Type any topic — broad or specific</p>
        <input class="topic-input" id="topic-input" type="text"
          placeholder='e.g. "Krebs cycle", "React hooks", "DCF valuation"…'
          value="${escAttr(state.topic)}"
          oninput="state.topic=this.value; refreshNav()"
          onkeydown="if(event.key==='Enter'&&canProceed())generate()"/>
        <p class="input-hint">Press Enter or click Generate ↓</p>
        ${navHTML()}
      </div>`;
    setTimeout(() => { const el = document.getElementById('topic-input'); if(el) el.focus(); }, 50);
  }
}

function navHTML() {
  const ready = canProceed();
  const isLast = state.step === 4;
  const back = state.step > 1
    ? `<button class="btn-back" onclick="goBack()">← Back</button>`
    : `<div></div>`;
  const next = isLast
    ? `<button class="btn-next${ready?' ready':''}" onclick="if(canProceed())generate()" id="next-btn">${ready ? '✦ Generate Prompt' : '✦ Generate Prompt'}</button>`
    : `<button class="btn-next${ready?' ready':''}" onclick="if(canProceed())goNext()" id="next-btn">Next →</button>`;
  return `<div class="nav">${back}${next}</div>`;
}

function refreshNav() {
  const ready = canProceed();
  const btn = document.getElementById('next-btn');
  if (btn) btn.className = 'btn-next' + (ready ? ' ready' : '');
}

function select(key, val) {
  state[key] = val;
  if (key !== 'topic') {
    if (state.step < 4) { state.step++; render(); }
    else render();
  }
}

function goNext() { if (canProceed() && state.step < 4) { state.step++; render(); } }
function goBack() { if (state.step > 1) { state.step--; render(); } }

async function generate() {
  if (!canProceed()) return;
  state.loading = true;
  render();

  const system = `You are a master prompt engineer who creates highly effective, personalized learning prompts.
Given inputs about the learner, generate ONE powerful "secret prompt" they can paste into any AI chatbot (Claude, ChatGPT, etc.) to learn anything effectively.

The prompt must:
- Be written in second person (addressed to the AI, not the user)
- Be 150-250 words
- Be specific to their field, goal, and style
- Include role-setting, context, method, and output format instructions
- Feel like a "cheat code" — something a beginner wouldn't know to write themselves
- End with a placeholder like: [PASTE YOUR TOPIC HERE]

Return ONLY the prompt text. No explanations, no preamble, no markdown formatting.`;

  const user = `Generate a secret learning prompt for:
- Background: ${state.field}
- Goal: ${state.goal}
- Preferred learning style: ${state.style}
- Topic they want to learn: ${state.topic}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system,
        messages: [{ role: "user", content: user }]
      })
    });
    const data = await res.json();
    state.prompt = (data.content?.find(b => b.type === "text")?.text || "Something went wrong. Please try again.").trim();
  } catch(e) {
    state.prompt = "⚠️ Error generating prompt. Please check your connection and try again.";
  }

  state.loading = false;
  render();
}

function copyPrompt() {
  const text = state.prompt;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = "✓ Copied to clipboard!"; btn.classList.add('copied'); }
    setTimeout(() => {
      if (btn) { btn.textContent = "📋 Copy Prompt"; btn.classList.remove('copied'); }
    }, 2500);
  });
}

function resetAll() {
  state = { step: 1, field: null, goal: null, style: null, topic: "", prompt: "" };
  document.getElementById('progress').style.display = 'flex';
  render();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Init
render();
</script>
</body>
</html>
